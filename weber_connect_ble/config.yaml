name: Weber Connect BLE Bridge
slug: weber_connect_ble
version: 0.1.0
stage: stable
image: ghcr.io/prospectore/{arch}-addon-weber_connect_ble
description: Local BLE bridge for Weber Connect probe telemetry in Home Assistant.
url: https://github.com/ProspectOre/weber-connect-home-assistant-addon/tree/main/weber_connect_ble
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
host_dbus: true
udev: true
privileged:
  - NET_ADMIN
  - NET_RAW
services:
  - mqtt:want
map:
  - data:rw
ingress: true
ingress_port: 8099
panel_icon: mdi:grill
options:
  log_level: info
  mqtt:
    host: ""
    port: 1883
    username: ""
    password: ""
schema:
  log_level: list(debug|info|warning|error)
  mqtt:
    host: str?
    port: port
    username: str?
    password: password?
