configuration:
  log_level:
    name: Log level
    description: Add-on logging verbosity. Leave at info unless debugging.
  mqtt:
    name: MQTT broker
    description: Leave blank to use the Home Assistant Mosquitto add-on automatically. Only fill this in for an external broker.
    fields:
      host:
        name: MQTT host
        description: Optional external MQTT broker host. Leave blank to use the Supervisor MQTT service.
      port:
        name: MQTT port
        description: MQTT broker port.
      username:
        name: MQTT username
        description: Optional MQTT username for an external broker.
      password:
        name: MQTT password
        description: Optional MQTT password for an external broker.
