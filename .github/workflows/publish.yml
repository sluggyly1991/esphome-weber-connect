name: Publish add-on images

on:
  push:
    branches:
      - main
    paths:
      - "weber_connect_ble/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and push (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v6

      - name: Read add-on version
        id: version
        run: echo "version=$(awk '/^version:/ {print $2; exit}' weber_connect_ble/config.yaml)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: weber_connect_ble
          file: weber_connect_ble/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/prospectore/${{ matrix.arch }}-addon-weber_connect_ble:${{ steps.version.outputs.version }}
            ghcr.io/prospectore/${{ matrix.arch }}-addon-weber_connect_ble:latest
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
          labels: |
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.arch=${{ matrix.arch }}
            io.hass.type=app
            org.opencontainers.image.source=https://github.com/ProspectOre/weber-connect-home-assistant-addon
            org.opencontainers.image.licenses=MIT
